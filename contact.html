<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:#fff;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.contact-box{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:30px;
}

.contact-info{
    color:white;
}

.contact-info h2{
    color:#38bdf8;
    margin-bottom:15px;
}

.contact-info p{
    margin:15px 0;
    line-height:1.6;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.1);
    color:white;
}

.contact-form textarea{
    resize:none;
    height:120px;
}

.contact-form button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.contact-form button:hover{
    background:#0ea5e9;
}

.social{
    margin-top:20px;
}

.social a{
    text-decoration:none;
    color:white;
    margin-right:15px;
    transition:.3s;
}

.social a:hover{
    color:#38bdf8;
}

@media(max-width:768px){
    .contact-box{
        grid-template-columns:1fr;
    }

    .container{
        padding:25px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>Contact Me</h1>
    <p class="subtitle">Feel free to get in touch with me anytime.</p>

    <div class="contact-box">

        <div class="contact-info">
            <h2>Get In Touch</h2>

            <p>📍 Bangladesh</p>
            <p>📧 ahsanul.cse522@nubtkhulna.ac.bd</p>
            

            <div class="social">
                <a href="#">Facebook</a>
                <a href="#">Instagram</a>
                <a href="#">GitHub</a>
            </div>
        </div>

        <div class="contact-form">
            <form>
                <input type="text" placeholder="Your Name" required>

                <input type="email" placeholder="Your Email" required>

                <input type="text" placeholder="Subject" required>

                <textarea placeholder="Write your message..." required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
